name: telegram-topic-listener

"on":
  workflow_dispatch:
  schedule:
    # 텔레그램에 /topic 또는 주제: 메시지를 남기면 약 10분 간격으로 확인합니다.
    # 더 빠른 실시간 반응은 Railway/Vercel 같은 별도 서버 webhook 방식이 필요합니다.
    - cron: "*/10 * * * *"

permissions:
  contents: read

concurrency:
  group: telegram-topic-listener
  cancel-in-progress: false

jobs:
  telegram-topic-listener:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Telegram topic requests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWS_PROVIDER: ${{ vars.NEWS_PROVIDER || 'naver_first' }}
          USE_NAVER_NEWS_CANDIDATES: ${{ vars.USE_NAVER_NEWS_CANDIDATES || 'true' }}
          USE_NAVER_DATALAB: ${{ vars.USE_NAVER_DATALAB || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ALLOWED_CHAT_IDS: ${{ vars.TELEGRAM_TOPIC_ALLOWED_CHAT_IDS || secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ACCEPT_PLAIN: ${{ vars.TELEGRAM_TOPIC_ACCEPT_PLAIN || 'false' }}
          TELEGRAM_TOPIC_LOOKBACK_HOURS: ${{ vars.TELEGRAM_TOPIC_LOOKBACK_HOURS || '48' }}
          TELEGRAM_TOPIC_NEWS_LINKS: ${{ vars.TELEGRAM_TOPIC_NEWS_LINKS || '8' }}
          TELEGRAM_TOPIC_INCLUDE_GLOBAL_BREAKING: ${{ vars.TELEGRAM_TOPIC_INCLUDE_GLOBAL_BREAKING || 'true' }}
          TELEGRAM_TOPIC_GLOBAL_BREAKING_COUNT: ${{ vars.TELEGRAM_TOPIC_GLOBAL_BREAKING_COUNT || '3' }}
          TELEGRAM_TOPIC_MAX_UPDATES: ${{ vars.TELEGRAM_TOPIC_MAX_UPDATES || '20' }}
          GLOBAL_BREAKING_NEWS_USE_DIRECT_SITES: ${{ vars.GLOBAL_BREAKING_NEWS_USE_DIRECT_SITES || 'true' }}
          GLOBAL_BREAKING_SOCIAL_FEEDS: ${{ vars.GLOBAL_BREAKING_SOCIAL_FEEDS || '' }}
          GOOGLE_TRENDS_GEO: KR
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '24' }}
        run: python telegram_topic_listener.py
